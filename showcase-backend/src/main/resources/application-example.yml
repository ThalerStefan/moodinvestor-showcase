spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/moodinvestor
    username: YOUR_USER
    password: REDACTED_FOR_SHOWCASE
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
        jdbc:
          '[time_zone]': UTC
server:
  port: 8080

# Intervall für den geplanten Coinbase‑Job (Standard: 30000 ms = 30 s)
app:
  price:
    refreshIntervalMs: 30000
    # baseUrl und apiKey sind optional; baseUrl default ist https://api.coinbase.com
    # apiKey: ""